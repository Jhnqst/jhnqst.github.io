<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Michael John Quisaot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #f2efe7;
        --surface: #ffffff;
        --ink: #1a1d24;
        --ink-soft: #666a75;
        --accent: #a8710f;
        --accent-strong: #8a5c0c;
        --border: #dcd7c9;
        --shadow: rgba(26, 29, 36, 0.08);
    }

    [data-theme="dark"] {
        --bg: #12141a;
        --surface: #1b1e27;
        --ink: #e9e6dd;
        --ink-soft: #9aa0ad;
        --accent: #ffb703;
        --accent-strong: #ffc933;
        --border: #2c303c;
        --shadow: rgba(0, 0, 0, 0.4);
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: var(--bg);
        color: var(--ink);
        font-family: 'Inter', sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        transition: background 0.25s ease, color 0.25s ease;
    }

    .window {
        width: 100%;
        max-width: 560px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        box-shadow: 0 12px 32px var(--shadow);
        overflow: hidden;
        transition: background 0.25s ease, border-color 0.25s ease;
    }

    .titlebar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
    }

    .dots {
        display: flex;
        gap: 7px;
    }

    .dots span {
        width: 11px;
        height: 11px;
        border-radius: 50%;
        display: inline-block;
    }

    .dots span:nth-child(1) { background: #ec6a5e; }
    .dots span:nth-child(2) { background: #f4bf4f; }
    .dots span:nth-child(3) { background: #61c554; }

    #theme-toggle {
        width: 30px;
        height: 30px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--ink-soft);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.9rem;
        transition: border-color 0.2s ease, color 0.2s ease;
    }

    #theme-toggle:hover {
        border-color: var(--accent);
        color: var(--accent);
    }

    .content {
        padding: 32px 28px 28px;
    }

    h1 {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 1.7rem;
        font-weight: 600;
        line-height: 1.3;
        margin-bottom: 4px;
    }

    h1 .name {
        color: var(--accent);
    }

    .cursor {
        display: inline-block;
        width: 9px;
        height: 1.15rem;
        background: var(--accent);
        margin-left: 4px;
        vertical-align: -3px;
        animation: blink 1s step-end infinite;
    }

    @keyframes blink {
        50% { opacity: 0; }
    }

    .subtitle {
        font-size: 0.9rem;
        color: var(--ink-soft);
        margin-bottom: 32px;
    }

    h2 {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--ink-soft);
        margin-bottom: 14px;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    h2::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
    }

    ol {
        list-style: none;
    }

    li {
        border: 1px solid var(--border);
        border-radius: 7px;
        margin-bottom: 8px;
        transition: border-color 0.2s ease, transform 0.15s ease;
    }

    li:hover {
        border-color: var(--accent);
        transform: translateX(2px);
    }

    li a {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 13px 16px;
        text-decoration: none;
        color: var(--ink);
        font-size: 0.95rem;
    }

    li a::before {
        content: "›";
        font-family: 'IBM Plex Mono', monospace;
        color: var(--accent);
        font-weight: 600;
        font-size: 1.1rem;
        transition: transform 0.2s ease;
    }

    li:hover a::before {
        transform: translateX(3px);
    }

    li a .ext {
        margin-left: auto;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.72rem;
        color: var(--ink-soft);
        background: var(--bg);
        border: 1px solid var(--border);
        padding: 2px 7px;
        border-radius: 4px;
    }
</style>
</head>
<body>

<div class="window">
    <div class="titlebar">
        <div class="dots"><span></span><span></span><span></span></div>
        <button id="theme-toggle" aria-label="Toggle dark mode">◐</button>
    </div>

    <div class="content">
        <h1><span class="name">Michael John Quisaot</span><span class="cursor"></span></h1>
        <p class="subtitle">CS student</p>

        <h2>HTML Tasks</h2>
        <ol>
            <li>
                <a href="portfolio.html">
                    E-Portfolio
                    <span class="ext">.html</span>
                </a>
            </li>
        </ol>
    </div>
</div>

<script>
    const toggle = document.getElementById('theme-toggle');
    const root = document.documentElement;
    const stored = localStorage.getItem('theme');
    if (stored === 'dark') {
        root.setAttribute('data-theme', 'dark');
        toggle.textContent = '◑';
    }
    toggle.addEventListener('click', () => {
        const isDark = root.getAttribute('data-theme') === 'dark';
        if (isDark) {
            root.removeAttribute('data-theme');
            toggle.textContent = '◐';
            localStorage.setItem('theme', 'light');
        } else {
            root.setAttribute('data-theme', 'dark');
            toggle.textContent = '◑';
            localStorage.setItem('theme', 'dark');
        }
    });
</script>

</body>
</html>
